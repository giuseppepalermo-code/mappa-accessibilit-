<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin Mappa</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f6f8fb;
      color:#111827;
    }
    .topbar{
      padding:16px 20px;
      background:#1f4b7a;
      color:#fff;
    }
    .wrap{
      max-width:520px;
      margin:50px auto;
      padding:18px;
    }
    .card{
      background:#fff;
      border:1px solid #dbe4ef;
      border-radius:18px;
      padding:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.08);
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:14px;
    }
    .field input{
      width:100%;
      padding:12px 14px;
      border:1px solid #dbe4ef;
      border-radius:14px;
      font-size:16px;
      outline:none;
    }
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:18px;
      cursor:pointer;
      background:#1f4b7a;
      color:#fff;
      font-weight:700;
    }
    #msg{
      margin-top:14px;
      min-height:24px;
      font-weight:700;
    }
    .ok{ color:#18794e; }
    .err{ color:#b42318; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 style="margin:0;">Area Admin Mappa</h1>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>Login associazione</h2>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" value="nessunostacolo@virgilio.it" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" value="nessunostacolo2025" />
      </div>

      <button type="button" onclick="doLogin()">Entra</button>

      <div id="msg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fawxdgdlmhuadpxjjpac.supabase.co";
    const SUPABASE_KEY = "sb_publishable_-BATje0RS7UM8GMtRiQjkQ_vujpg8ho";

    const msg = document.getElementById("msg");

    function setMsg(text, cls = "") {
      msg.textContent = text;
      msg.className = cls;
    }

    if (!window.supabase || !window.supabase.createClient) {
      setMsg("Errore: libreria Supabase non caricata.", "err");
      throw new Error("Supabase non caricata");
    }

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function doLogin() {
      alert("Click ricevuto");

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      setMsg("Accesso in corso...");

      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setMsg("Login non riuscito: " + error.message, "err");
        return;
      }

      if (!data || !data.user) {
        setMsg("Login non riuscito: utente non trovato.", "err");
        return;
      }

      const { data: adminData, error: adminError } = await client
        .from("admin_utenti")
        .select("email, attivo, ruolo")
        .eq("email", email)
        .maybeSingle();

      if (adminError) {
        setMsg("Errore controllo admin: " + adminError.message, "err");
        return;
      }

      if (!adminData) {
        setMsg("Utente autenticato ma non presente in admin_utenti.", "err");
        return;
      }

      if (adminData.attivo === false) {
        setMsg("Utente disattivato.", "err");
        return;
      }

      setMsg("LOGIN RIUSCITO", "ok");
    }

    window.doLogin = doLogin;
  </script>
</body>
</html>
